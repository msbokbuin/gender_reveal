<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보름이의 성별 공개 · 정원조 ♡ 채희주</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0c1030;
    --night-deep:#070920;
    --indigo:#1d2356;
    --moon:#fff6e3;
    --gold:#f6d98b;
    --rose:#ff9ec2;
    --rose-deep:#ff6fa5;
    --cream:#fff8ee;
    --ink:#fdfbff;
    --muted:#b9bce0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'Gowun Dodum',sans-serif;
    background:var(--night-deep);
    color:var(--ink);
    overflow-x:hidden;
    line-height:1.7;
  }

  /* ---------- starfield ---------- */
  .sky{
    position:fixed;inset:0;z-index:-2;
    background:
      radial-gradient(1200px 800px at 50% -10%, #2a2f6b 0%, transparent 60%),
      linear-gradient(180deg,#0c1030 0%,#0a0d28 45%,#070920 100%);
  }
  .stars,.stars2{position:fixed;inset:0;z-index:-1;pointer-events:none}
  .star{position:absolute;background:#fff;border-radius:50%;opacity:.8;
    animation:twinkle var(--t,4s) ease-in-out infinite alternate}
  @keyframes twinkle{from{opacity:.15;transform:scale(.7)}to{opacity:.95;transform:scale(1)}}

  .wrap{max-width:760px;margin:0 auto;padding:0 24px}

  /* ---------- hero ---------- */
  .hero{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:64px 24px 48px;position:relative}
  .eyebrow{font-family:'Gowun Batang',serif;letter-spacing:.32em;font-size:.78rem;color:var(--gold);text-transform:uppercase;margin-bottom:26px}
  .eyebrow b{color:var(--cream);font-weight:700}
  .hero h1{font-family:'Jua',sans-serif;font-weight:400;font-size:clamp(2.3rem,8vw,3.6rem);line-height:1.25;letter-spacing:.01em;
    background:linear-gradient(180deg,#fff 0%,#ffe9c7 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p.sub{color:var(--muted);margin-top:18px;font-size:1.02rem}

  /* ---------- moon ---------- */
  .moon-stage{position:relative;width:230px;height:230px;margin:42px auto 8px;display:grid;place-items:center}
  .moon{
    width:180px;height:180px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fffdf6 0%, var(--moon) 45%, #efe2c0 100%);
    box-shadow:0 0 60px 14px rgba(246,217,139,.45), inset -18px -14px 40px rgba(140,120,80,.25);
    position:relative;transition:background 1.4s ease, box-shadow 1.4s ease;
    animation:float 6s ease-in-out infinite;
  }
  .moon::before,.moon::after,.moon i{content:"";position:absolute;border-radius:50%;background:rgba(150,132,96,.22)}
  .moon::before{width:34px;height:34px;top:42px;left:46px}
  .moon::after{width:22px;height:22px;bottom:38px;right:50px}
  .moon i{width:16px;height:16px;top:96px;left:104px}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .moon-stage.reveal .moon{
    background:radial-gradient(circle at 35% 30%, #fff 0%, var(--rose) 50%, var(--rose-deep) 100%);
    box-shadow:0 0 80px 22px rgba(255,111,165,.55), inset -18px -14px 40px rgba(190,70,120,.3);
  }
  .moon-label{position:absolute;inset:0;display:grid;place-items:center;font-family:'Jua',sans-serif;
    font-size:2.6rem;color:#fff;opacity:0;transform:scale(.6);transition:opacity .8s .4s,transform .8s .4s;text-shadow:0 2px 14px rgba(120,30,70,.5)}
  .moon-stage.reveal .moon-label{opacity:1;transform:scale(1)}

  .scroll-hint{margin-top:30px;color:var(--muted);font-size:.82rem;letter-spacing:.16em;animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(7px);opacity:1}}

  /* ---------- sections ---------- */
  section.card{margin:0 auto 0;padding:60px 0 90px}
  .panel{
    background:linear-gradient(180deg,rgba(40,46,100,.55),rgba(20,24,60,.55));
    border:1px solid rgba(246,217,139,.22);
    border-radius:26px;padding:42px 30px;backdrop-filter:blur(6px);
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .tag{display:inline-block;font-family:'Gowun Batang',serif;font-size:.74rem;letter-spacing:.28em;color:var(--gold);
    border:1px solid rgba(246,217,139,.4);border-radius:999px;padding:6px 16px;margin-bottom:20px}
  .q-title{font-family:'Jua',sans-serif;font-size:clamp(1.5rem,5.4vw,2.05rem);text-align:center;line-height:1.4}
  .q-title em{font-style:normal;color:var(--rose)}
  .q-note{text-align:center;color:var(--muted);margin-top:12px;font-size:.95rem}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:34px}
  .choice{
    cursor:pointer;border:none;border-radius:20px;padding:30px 18px;font-family:'Jua',sans-serif;font-size:1.4rem;color:#fff;
    transition:transform .18s ease, box-shadow .25s ease, filter .25s ease;position:relative;overflow:hidden;
  }
  .choice .emoji{display:block;font-size:2.1rem;margin-bottom:10px}
  .choice.boy{background:linear-gradient(160deg,#5b8def,#3a5fd9)}
  .choice.girl{background:linear-gradient(160deg,#ff9ec2,#ff6fa5)}
  .choice:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(0,0,0,.4)}
  .choice:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
  .choice:disabled{cursor:default;filter:saturate(.55) brightness(.8)}
  .choice.picked{transform:translateY(-2px);box-shadow:0 0 0 3px var(--gold), 0 14px 30px rgba(0,0,0,.4);filter:none !important}

  .result{margin-top:28px;text-align:center;min-height:10px}
  .result .big{font-family:'Jua',sans-serif;font-size:1.5rem;margin-bottom:8px}
  .result.win .big{color:var(--rose)}
  .result.miss .big{color:var(--gold)}
  .result p{color:var(--muted);font-size:.96rem}
  .fade-in{animation:fade .6s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ---------- lottery ---------- */
  #lottery{display:none}
  #lottery.show{display:block;animation:fade .7s ease both}
  .candy{font-size:3rem;text-align:center;margin:6px 0 4px;animation:spin 4s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .odds{text-align:center;color:var(--gold);font-family:'Gowun Batang',serif;letter-spacing:.04em;font-size:1.05rem}
  .draw-btn{
    display:block;margin:26px auto 0;cursor:pointer;border:none;border-radius:999px;
    font-family:'Jua',sans-serif;font-size:1.15rem;color:#3a1d10;
    background:linear-gradient(135deg,#ffd97a,#ff8fb0);padding:16px 42px;
    box-shadow:0 10px 26px rgba(255,140,160,.4);transition:transform .15s,box-shadow .25s;
  }
  .draw-btn:hover{transform:translateY(-3px);box-shadow:0 16px 32px rgba(255,140,160,.5)}
  .draw-btn:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
  .draw-btn:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}

  .prize{margin-top:26px;text-align:center;min-height:8px}
  .prize .headline{font-family:'Jua',sans-serif;font-size:1.7rem;margin-bottom:10px}
  .prize.jackpot .headline{color:var(--rose)}
  .prize.dud .headline{color:var(--muted)}
  .prize .capture{
    margin-top:16px;display:inline-block;background:rgba(246,217,139,.14);
    border:1px dashed rgba(246,217,139,.5);border-radius:16px;padding:14px 20px;color:var(--cream);font-size:.92rem
  }

  /* ---------- family footer ---------- */
  footer{padding:50px 24px 70px;text-align:center}
  .family{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin-top:8px}
  .member{min-width:120px}
  .member .role{font-family:'Gowun Batang',serif;font-size:.74rem;letter-spacing:.22em;color:var(--gold)}
  .member .name{font-family:'Jua',sans-serif;font-size:1.3rem;margin-top:4px}
  .heart{color:var(--rose);font-size:1.1rem}
  .sig{margin-top:34px;color:var(--muted);font-family:'Gowun Batang',serif;font-size:.85rem;letter-spacing:.06em}

  /* confetti */
  .confetti{position:fixed;top:-12px;width:10px;height:14px;z-index:50;pointer-events:none;border-radius:2px}

  @media(max-width:480px){
    .panel{padding:32px 20px}
    .choices{gap:12px}
    .choice{padding:24px 12px;font-size:1.2rem}
    .family{gap:18px}
  }
</style>
</head>
<body>
<div class="sky"></div>
<div class="stars" id="stars"></div>

<!-- HERO -->
<header class="hero">
  <div class="eyebrow"><b>정원조</b> &nbsp;♡&nbsp; <b>채희주</b></div>
  <h1>보름이의<br>성별 공개</h1>
  <p class="sub">우리 가족만을 위한 작은 보름달 이벤트</p>

  <div class="moon-stage" id="moonStage">
    <div class="moon"><i></i></div>
    <div class="moon-label" id="moonLabel">딸 ♡</div>
  </div>

  <div class="scroll-hint">아래로 내려서 맞춰보세요 ▾</div>
</header>

<!-- QUIZ -->
<section class="card wrap">
  <div class="panel">
    <div style="text-align:center"><span class="tag">QUIZ</span></div>
    <h2 class="q-title">보름이는 <em>아들</em>일까요,<br><em>딸</em>일까요?</h2>
    <p class="q-note">마음으로 점지한 답을 하나만 골라주세요.</p>

    <div class="choices">
      <button class="choice boy" id="btnBoy"><span class="emoji">👦</span>아들</button>
      <button class="choice girl" id="btnGirl"><span class="emoji">👧</span>딸</button>
    </div>

    <div class="result" id="quizResult" aria-live="polite"></div>
  </div>
</section>

<!-- LOTTERY -->
<section class="card wrap" id="lottery">
  <div class="panel">
    <div style="text-align:center"><span class="tag">선물 추첨</span></div>
    <div class="candy">🍭</div>
    <p class="odds">정답을 맞춘 당신께 &nbsp;<b>5%</b>&nbsp; 확률의 츄파춥스 행운을!<br><span style="font-size:.82rem;color:var(--muted)">기회는 단 한 번뿐이에요.</span></p>

    <button class="draw-btn" id="drawBtn">사탕 뽑기 🍬</button>

    <div class="prize" id="prize" aria-live="polite"></div>
  </div>
</section>

<!-- FAMILY -->
<footer>
  <div class="eyebrow" style="margin-bottom:14px">OUR FAMILY</div>
  <div class="family">
    <div class="member"><div class="role">아빠</div><div class="name">정원조</div></div>
    <div class="member"><div class="role">엄마</div><div class="name">채희주</div></div>
    <div class="member"><div class="role">딸 · 태명</div><div class="name">보름이 <span class="heart">♡</span></div></div>
  </div>
  <p class="sig">보름달처럼 환하게 자라나길 · with love</p>
</footer>

<script>
  /* starfield */
  (function(){
    const box=document.getElementById('stars');
    const n=window.innerWidth<480?70:120;
    for(let i=0;i<n;i++){
      const s=document.createElement('div');
      s.className='star';
      const sz=Math.random()*2.2+0.6;
      s.style.width=s.style.height=sz+'px';
      s.style.left=Math.random()*100+'%';
      s.style.top=Math.random()*100+'%';
      s.style.setProperty('--t',(Math.random()*4+2.5)+'s');
      s.style.animationDelay=(Math.random()*4)+'s';
      box.appendChild(s);
    }
  })();

  const btnBoy=document.getElementById('btnBoy');
  const btnGirl=document.getElementById('btnGirl');
  const quizResult=document.getElementById('quizResult');
  const lottery=document.getElementById('lottery');
  const moonStage=document.getElementById('moonStage');
  let solved=false;

  function lockChoices(){btnBoy.disabled=true;btnGirl.disabled=true;}

  btnBoy.addEventListener('click',()=>{
    btnBoy.classList.add('picked');
    quizResult.className='result miss fade-in';
    quizResult.innerHTML='<div class="big">음… 다시 한 번 보름달을 보세요 🌙</div><p>마음을 모아 한 번 더 골라볼까요?</p>';
    btnBoy.classList.remove('picked');
  });

  btnGirl.addEventListener('click',()=>{
    if(solved)return;
    solved=true;
    btnGirl.classList.add('picked');
    lockChoices();
    moonStage.classList.add('reveal');     // 보름달이 분홍빛으로 차오르며 '딸' 공개
    quizResult.className='result win fade-in';
    quizResult.innerHTML='<div class="big">정답이에요! 보름이는 딸이랍니다 👧💗</div><p>축하해요! 이제 행운의 사탕을 뽑을 차례예요.</p>';
    burst();
    lottery.classList.add('show');
    window.scrollTo({top:0,behavior:'smooth'});   // 맨 위로 올라가 달이 차오르는 모습 감상
    setTimeout(()=>lottery.scrollIntoView({behavior:'smooth',block:'start'}),3200); // 잠시 감상 후 추첨으로
  });

  /* lottery 1% */
  const drawBtn=document.getElementById('drawBtn');
  const prize=document.getElementById('prize');
  drawBtn.addEventListener('click',()=>{
    drawBtn.disabled=true;
    drawBtn.textContent='뽑는 중…';
    setTimeout(()=>{
      const win=Math.random()<0.05;   // 5% 확률 · 단 한 번의 기회
      drawBtn.textContent='뽑기 완료';   // 재시도 없이 비활성 유지
      if(win){
        prize.className='prize jackpot fade-in';
        prize.innerHTML=
          '<div class="headline">🎉 당첨! 🍭</div>'+
          '<p>5% 확률을 뚫은 진짜 행운의 주인공이에요!</p>'+
          '<div class="capture">📸 이 화면을 캡쳐해서 보내주시면<br>츄파춥스 사탕을 선물로 보내드릴게요!</div>';
        burst();burst();
      }else{
        prize.className='prize dud fade-in';
        prize.innerHTML=
          '<div class="headline">아쉽게도 꽝이에요 🍬</div>'+
          '<p>기회는 단 한 번뿐이었어요. 그래도 정답을 맞힌 마음만으로 충분히 고마워요!</p>';
      }
    },900);
  });

  /* confetti */
  function burst(){
    const colors=['#ff9ec2','#ff6fa5','#f6d98b','#fff6e3','#9db7ff'];
    for(let i=0;i<70;i++){
      const c=document.createElement('div');
      c.className='confetti';
      c.style.left=Math.random()*100+'vw';
      c.style.background=colors[i%colors.length];
      c.style.transform='rotate('+(Math.random()*360)+'deg)';
      const dur=Math.random()*1.6+1.8;
      c.animate([
        {transform:`translateY(0) rotate(0deg)`,opacity:1},
        {transform:`translateY(105vh) rotate(${Math.random()*720}deg)`,opacity:.9}
      ],{duration:dur*1000,easing:'cubic-bezier(.2,.6,.4,1)'});
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),dur*1000);
    }
  }
</script>
</body>
</html>
